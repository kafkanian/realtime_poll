<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 설문조사 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f9fafb; --card: #ffffff; --text: #1f2937; --border: #e5e7eb; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .option-wrapper { display: flex; gap: 8px; margin-bottom: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: #f3f4f6; color: var(--text); border: 1px solid var(--border); width: auto; margin-top: 5px; }
        .btn-d { background: #fee2e2; color: #ef4444; width: auto; }
        .app-section { display: none; }
        .app-section.active { display: block; }
        .qr-panel { text-align: center; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        #qrcode { display: inline-block; padding: 10px; background: white; border: 1px solid var(--border); margin: 15px 0; }
        .poll-item { position: relative; background: #f3f4f6; border-radius: 8px; margin-bottom: 12px; overflow: hidden; height: 52px; border: 1px solid transparent; }
        .poll-progress { background: #e0e7ff; height: 100%; width: 0%; transition: width 0.6s ease; }
        .poll-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-weight: bold; }
        
        /* 히스토리 아이템 내부 레이아웃 조정 */
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: #ffffff; transition: background 0.2s; }
        .hist-item:hover { background: #f9fafb; }
        .hist-info { flex-grow: 1; margin-right: 15px; }
        .hist-btns { display: flex; gap: 6px; align-items: center; }
        .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .hist-title { margin: 0; font-size: 1.2rem; }
        
        .vote-counter-box { display: flex; align-items: center; justify-content: space-between; background: #e0f2fe; color: #0369a1; padding: 12px 16px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="sec-create" class="app-section active">
            <h2>📊 실시간 설문조사 생성</h2>
            <div class="form-group">
                <label>설문 질문</label>
                <input type="text" id="p-question" placeholder="예: 오늘 점심 메뉴는?">
            </div>
            <div class="form-group">
                <label>선택지 항목</label>
                <div id="opt-container">
                    <div class="option-wrapper"><input type="text" class="opt-input" placeholder="선택지 1"></div>
                    <div class="option-wrapper"><input type="text" class="opt-input" placeholder="선택지 2"></div>
                </div>
                <button type="button" class="btn-s" onclick="addOpt()">+ 항목 추가</button>
            </div>
            <button type="button" class="btn-p" onclick="createPoll()">실시간 설문방 생성</button>
        </div>

        <div id="sec-dash" class="app-section">
            <button type="button" id="btn-home" class="btn-s" style="margin-bottom:20px;" onclick="goHome()">🏠 처음으로</button>
            <h2 id="dash-q">질문 제목</h2>
            
            <div class="qr-panel" id="dash-qr-panel">
                <h3>📱 참여 QR 코드</h3>
                <div id="qrcode"></div>
                <div id="share-url" style="font-size:0.8rem; color:#6b7280; word-break:break-all;"></div>
            </div>
            
            <div class="vote-counter-box">
                <span>👥 현재 실시간 참여자 수</span>
                <span><span id="total-v" style="font-size: 1.3rem;">0</span> 명</span>
            </div>

            <h3>📊 투표 결과 실시간 현황</h3>
            <div id="dash-results"></div>
        </div>

        <div id="sec-vote" class="app-section">
            <h2 id="vote-q">질문 로딩중...</h2>
            <div id="vote-options"></div>
            <p id="vote-ok" style="color:#10b981; font-weight:bold; text-align:center; display:none; margin-top:20px;">✓ 투표가 반영되었습니다!</p>
        </div>
    </div>

    <div class="container" id="hist-box">
        <div class="hist-header">
            <h3 class="hist-title">🕒 내가 만든 설문 히스토리</h3>
            <button type="button" class="btn-d" style="padding: 6px 12px; font-size: 0.85rem;" onclick="clearAllHistory()">전체 초기화</button>
        </div>
        <div id="hist-list"></div>
    </div>

<script>
    // 🛠️여기에 본인의 Supabase 정보를 정확하게 입력하세요!
    const MY_URL = 'https://sajarqjkenrvewxtkqzv.supabase.co'; 
    const MY_KEY = 'sb_publishable_MVL8BLB5LZpo1gM8IJTLKw_8WdDhaOH';
    
    let clientSupabase = null;
    let currentId = null;
    let channelRealtime = null;

    if (MY_URL !== '여기에_수파베이스_주소_입력') {
        clientSupabase = supabase.createClient(MY_URL, MY_KEY);
    }

    window.onload = function() {
        showHistory();
        const pId = new URLSearchParams(window.location.search).get('poll_id');
        if (pId) {
            currentId = pId;
            if (localStorage.getItem('my_poll_' + pId)) { 
                openDash(pId, true); 
            } else { 
                openVote(pId); 
            }
        }
    };

    function uiswitch(id) {
        document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('hist-box').style.display = (id === 'sec-create') ? 'block' : 'none';
    }

    function addOpt() {
        const div = document.createElement('div');
        div.className = 'option-wrapper';
        div.innerHTML = `<input type="text" class="opt-input" placeholder="선택지"><button type="button" class="btn-d" onclick="this.parentElement.remove()">삭제</button>`;
        document.getElementById('opt-container').appendChild(div);
    }

    function goHome() { window.location.href = window.location.origin + window.location.pathname; }

    async function createPoll() {
        if (!clientSupabase) { alert("코드 상단에 Supabase 주소와 키를 입력해주세요!"); return; }
        const q = document.getElementById('p-question').value.trim();
        const inputs = document.getElementsByClassName('opt-input');
        const opts = [];
        for(let i of inputs) { if(i.value.trim()) opts.push(i.value.trim()); }

        if(!q || opts.length < 2) { alert("질문과 2개 이상의 선택지를 입력하세요."); return; }

        try {
            const { data: pData, error: pErr } = await clientSupabase.from('polls').insert([{ question: q }]).select().single();
            if (pErr) throw pErr;
            
            const optData = opts.map(t => ({ poll_id: pData.id, text: t, votes: 0 }));
            const { error: oErr } = await clientSupabase.from('options').insert(optData);
            if (oErr) throw oErr;

            localStorage.setItem('my_poll_' + pData.id, 'true');
            const h = JSON.parse(localStorage.getItem('poll_h') || '[]');
            h.unshift({ id: pData.id, q: q });
            localStorage.setItem('poll_h', JSON.stringify(h));

            currentId = pData.id;
            openDash(pData.id, true); 
            window.history.pushState({}, '', `?poll_id=${pData.id}`);
        } catch (e) { alert("오류 발생: " + e.message); }
    }

    async function openDash(id, isHost = false) {
        uiswitch('sec-dash');
        const { data: p } = await clientSupabase.from('polls').select('*').eq('id', id).single();
        document.getElementById('dash-q').innerText = `Q. ${p.question}`;
        
        if (isHost) {
            document.getElementById('btn-home').style.display = 'inline-block';
            document.getElementById('dash-qr-panel').style.display = 'block';
            
            const url = `${window.location.origin}${window.location.pathname}?poll_id=${id}`;
            document.getElementById('share-url').innerText = url;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: url, width: 150, height: 150 });
        } else {
            document.getElementById('btn-home').style.display = 'none';
            document.getElementById('dash-qr-panel').style.display = 'none';
        }

        drawChart(id);
        
        if (channelRealtime) clientSupabase.removeChannel(channelRealtime);
        channelRealtime = clientSupabase.channel(`any:${id}`)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'options', filter: `poll_id=eq.${id}` }, () => { 
                drawChart(id); 
            })
            .subscribe();
    }

    async function drawChart(id) {
        const { data: opts } = await clientSupabase.from('options').select('*').eq('poll_id', id).order('id', {ascending:true});
        const container = document.getElementById('dash-results');
        container.innerHTML = '';
        
        const total = opts.reduce((s, o) => s + o.votes, 0);
        document.getElementById('total-v').innerText = total;

        opts.forEach(o => {
            const pct = total > 0 ? Math.round((o.votes / total) * 100) : 0;
            const div = document.createElement('div');
            div.className = 'poll-item';
            div.style.cursor = 'default'; 
            
            div.innerHTML = `<div class="poll-progress" style="width:${pct}%"></div><div class="poll-content"><span>${o.text}</span><span>${o.votes}표 (${pct}%)</span></div>`;
            container.appendChild(div);
        });
    }

    async function openVote(id) {
        uiswitch('sec-vote');
        const { data: p } = await clientSupabase.from('polls').select('*').eq('id', id).single();
        document.getElementById('vote-q').innerText = `Q. ${p.question}`;
        
        const { data: opts } = await clientSupabase.from('options').select('*').eq('poll_id', id).order('id', {ascending:true});
        const container = document.getElementById('vote-options');
        container.innerHTML = '';

        opts.forEach(o => {
            const div = document.createElement('div');
            div.className = 'poll-item';
            div.style.cursor = 'pointer'; 
            div.onclick = async () => {
                if(localStorage.getItem('voted_' + id)) { alert("이미 투표하셨습니다."); return; }
                await voteLogic(o.id, o.votes);
                localStorage.setItem('voted_' + id, 'true');
                document.getElementById('vote-ok').style.display = 'block';
                
                setTimeout(() => { openDash(id, false); }, 1000);
            };
            div.innerHTML = `<div class="poll-content"><span>${o.text}</span><span>🗳️ 투표</span></div>`;
            container.appendChild(div);
        });
    }

    async function voteLogic(oid, cvotes) {
        await clientSupabase.from('options').update({ votes: cvotes + 1 }).eq('id', oid);
    }

    // 🕒 히스토리 화면 그리기 함수 (삭제 로직 반영)
    function showHistory() {
        const h = JSON.parse(localStorage.getItem('poll_h') || '[]');
        const container = document.getElementById('hist-list');
        if(!h.length) { container.innerHTML = '<p style="color:#6b7280; text-align:center;">저장된 설문 내역이 없습니다.</p>'; return; }
        
        container.innerHTML = '';
        h.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'hist-item';
            
            // 글자 클릭 시 결과 보기로 이동
            div.innerHTML = `
                <div class="hist-info" onclick="window.location.href='?poll_id=${item.id}'">
                    <strong>${item.q}</strong>
                </div>
                <div class="hist-btns">
                    <button class="btn-s" style="margin:0; padding:6px 12px; font-size:0.85rem;" onclick="window.location.href='?poll_id=${item.id}'">결과보기</button>
                    <button class="btn-d" style="margin:0; padding:6px 12px; font-size:0.85rem;" onclick="deleteHistoryItem(event, ${index}, '${item.id}')">❌</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // ❌ 변경 포인트: 특정 히스토리 하나만 골라서 지우기
    function deleteHistoryItem(event, index, id) {
        event.stopPropagation(); // 클릭 이벤트가 부모 div로 번져 페이지 이동이 일어나는 것 차단
        if(!confirm("이 설문 기록을 목록에서 삭제하시겠습니까? (Supabase 데이터베이스 서버에는 기록이 유지됩니다)")) return;
        
        const h = JSON.parse(localStorage.getItem('poll_h') || '[]');
        h.splice(index, 1); // 해당 순서의 아이템 제거
        localStorage.setItem('poll_h', JSON.stringify(h));
        localStorage.removeItem('my_poll_' + id); // 방장 권한 표식도 제거
        
        showHistory(); // 히스토리 목록 새로고침
    }

    // 🔥 변경 포인트: 모든 히스토리 한 번에 초기화하기
    function clearAllHistory() {
        if(!confirm("정말로 모든 설문 기록 히스토리를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) return;
        
        const h = JSON.parse(localStorage.getItem('poll_h') || '[]');
        h.forEach(item => {
            localStorage.removeItem('my_poll_' + item.id); // 모든 방장 권한 표식 제거
        });
        
        localStorage.removeItem('poll_h'); // 히스토리 목록 키 완전 삭제
        showHistory(); // 목록 갱신
    }
</script>
</body>
</html>
